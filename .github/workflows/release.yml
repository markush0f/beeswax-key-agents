name: Build and Publish Releases

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: vss-can
            asset_name: vss-can-x86_64-linux.tar.gz
            archive: tar
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: vss-can
            asset_name: vss-can-x86_64-macos.tar.gz
            archive: tar
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: vss-can
            asset_name: vss-can-aarch64-macos.tar.gz
            archive: tar
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: vss-can.exe
            asset_name: vss-can-x86_64-windows.zip
            archive: zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --release --bin vss-can --target ${{ matrix.target }}

      - name: Package binary (tar - Unix)
        if: matrix.archive == 'tar'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../${{ matrix.asset_name }} vss-can
          cd ../../../

      - name: Package binary (zip - Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $src = "target/${{ matrix.target }}/release/vss-can.exe"
          Compress-Archive -Path $src -DestinationPath "${{ matrix.asset_name }}"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
